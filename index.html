<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Сони</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header-text {
            position: absolute;
            top: 50px;
            text-align: center;
            z-index: 5;
            width: 100%;
        }

        .header-text h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .header-text p {
            font-style: italic;
            color: #ffb6c1;
            margin-top: 10px;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            /* Увеличенный отступ, чтобы кнопки не закрывали текст */
            margin-top: 180px; 
            padding: 0 20px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 182, 193, 0.3);
            border-color: #ffb6c1;
            transform: scale(1.05);
        }

        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart {
            background-color: #d63384;
            display: inline-block;
            height: 150px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 150px;
            box-shadow: 0 0 50px #ff3399;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart:before,
        .heart:after {
            background-color: #d63384;
            border-radius: 50%;
            content: "";
            height: 150px;
            position: absolute;
            width: 150px;
        }

        .heart:before {
            top: -75px;
            left: 0;
        }

        .heart:after {
            left: 75px;
            top: 0;
        }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        #message-display {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            max-width: 80%;
            font-size: 1.2rem;
            color: #ffb6c1;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>ДЛЯ СОНИ</h1>
        <p>Благодарен Богу за тебя</p>
    </div>

    <div class="buttons-container">
        <button class="btn" onclick="showMessage('❤️ Главное', 'Ты самое дорогое, что у меня есть.')">❤️ Главное</button>
        <button class="btn" onclick="showMessage('☁️ Тот дождь', 'Помнишь, как мы гуляли под дождем? Это было волшебно.')">☁️ Тот дождь</button>
        <button class="btn" onclick="showMessage('🤝 Первая встреча', 'Тот день изменил мою жизнь навсегда.')">🤝 Первая встреча</button>
        <button class="btn" onclick="showMessage('🌊 Наше море', 'Мечтаю снова оказаться там вместе с тобой.')">🌊 Наше море</button>
    </div>

    <div class="heart-container">
        <div class="heart"></div>
    </div>

    <div id="message-display">Нажми на любую кнопку...</div>

    <script>
        function showMessage(title, text) {
            const display = document.getElementById('message-display');
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerHTML = `<strong>${title}</strong><br>${text}`;
                display.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
