<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Для Сони</title>
    <style>
        /* Подключаем красивый шрифт для новой фразы */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');

        body {
            margin: 0;
            background: #050005;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Холст для звездного фона */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Чтобы не перекрывать клики по кнопкам */
        }

        /* Текст по центру */
        .text-container {
            position: absolute;
            top: 15%;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        .name-label {
            font-size: 26px;
            letter-spacing: 5px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            margin: 0;
        }

        .sub-label {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: #ffb3d9;
            margin-top: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        /* Большое светящееся сердце в центре */
        .main-heart {
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: #ff1493;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px #ff1493, 0 0 100px #ff1493;
            animation: beat 1.2s infinite;
            z-index: 1;
        }

        .main-heart::before, .main-heart::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: #ff1493;
            border-radius: 50%;
        }

        .main-heart::before { top: -75px; left: 0; }
        .main-heart::after { left: 75px; top: 0; }

        @keyframes beat {
            0% { transform: rotate(-45deg) scale(1); }
            15% { transform: rotate(-45deg) scale(1.2); }
            30% { transform: rotate(-45deg) scale(1); }
            45% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        /* Летающие кнопки воспоминаний */
        .memory-btn {
            position: absolute;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }

        /* Окно истории */
        #story-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%;
            background: rgba(20, 0, 10, 0.95);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #ff1493;
            text-align: center;
            z-index: 100;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #story-box.active { transform: translate(-50%, -50%) scale(1); }

        .close-btn {
            margin-top: 20px;
            color: #ff1493;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        #story-box h2 { color: #ff69b4; margin-top: 0; }
        #story-box p { line-height: 1.6; font-size: 16px; margin-bottom: 0; }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="text-container">
        <div class="name-label">ДЛЯ СОНИ</div>
        <div class="sub-label">благодарен Богу за тебя</div>
    </div>

    <div class="main-heart"></div>

    <div class="memory-btn" style="top: 35%; left: 10%; animation-delay: 0s;" onclick="showStory(0)">🌧️ Тот дождь</div>
    <div class="memory-btn" style="top: 65%; right: 10%; animation-delay: 1s;" onclick="showStory(1)">🤝 Первая встреча</div>
    <div class="memory-btn" style="top: 80%; left: 20%; animation-delay: 2s;" onclick="showStory(2)">🌊 Наше море</div>
    <div class="memory-btn" style="top: 15%; right: 15%; animation-delay: 3.5s;" onclick="showStory(3)">❤️ Главное</div>

    <div id="story-box">
        <h2 id="title"></h2>
        <p id="text"></p>
        <div class="close-btn" onclick="closeStory()">Нажми, чтобы закрыть</div>
    </div>

    <script>
        // ЛОГИКА ИСТОРИЙ
        const stories = [
            { t: "Тот самый ливень 🌧️", txt: "Помнишь, как мы промокли до ниточки? Мы бежали, смеялись, и это был самый счастливый дождь в моей жизни. Я тогда понял, что мне с тобой ничего не страшно." },
            { t: "Первая встреча ❤️", txt: "Мы так стеснялись друг друга... Я боялся сказать лишнее слово, а ты постоянно поправляла волосы. Но я уже тогда почувствовал, что ты особенная." },
            { t: "Наше море 🌊", txt: "Первый раз вместе у воды. Тёплый ветер, шум волн и это невероятное чувство спокойствия, потому что ты была рядом. Хочу повторить это еще тысячу раз." },
            { t: "Соня, люблю тебя! ✨", txt: "Ты — лучшее, что со мной случилось. Этот код, эти слова — всё для тебя. Ты моя бесконечность!" }
        ];

        function showStory(id) {
            document.getElementById('title').innerText = stories[id].t;
            document.getElementById('text').innerText = stories[id].txt;
            document.getElementById('story-box').classList.add('active');
        }

        function closeStory() {
            document.getElementById('story-box').classList.remove('active');
        }

        // ЛОГИКА ЗВЕЗДНОГО ФОНА (КАНВАС)
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let mouseX = -100, mouseY = -100;
        let tiltX = 0, tiltY = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                // Звезды либо белые, либо нежно-розовые
                this.color = Math.random() > 0.5 ? '#ffffff' : '#ffb3d9';
            }

            update() {
                // Влияние акселерометра (наклона телефона)
                this.x += tiltX * this.size;
                this.y += tiltY * this.size;
                
                // Базовое движение
                this.x += this.vx;
                this.y += this.vy;

                // Влияние пальца/мыши (звезды разлетаются)
                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 120) {
                    this.x -= dx * 0.05;
                    this.y -= dy * 0.05;
                }

                // Возврат за границы экрана
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Создаем 120 звезд
        for(let i = 0; i < 120; i++) {
            stars.push(new Star());
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // Отслеживание пальца/мыши
        function handleInteraction(e) {
            mouseX = e.touches ? e.touches[0].clientX : e.clientX;
            mouseY = e.touches ? e.touches[0].clientY : e.clientY;
        }
        
        window.addEventListener('mousemove', handleInteraction);
        window.addEventListener('touchmove', handleInteraction);
        window.addEventListener('touchend', () => { mouseX = -100; mouseY = -100; });

        // Отслеживание наклона устройства (акселерометр)
        window.addEventListener('devicemotion', (e) => {
            if (e.accelerationIncludingGravity) {
                // Коэффициент 0.3 для плавности падения звезд
                tiltX = (e.accelerationIncludingGravity.x || 0) * 0.3;
                tiltY = -(e.accelerationIncludingGravity.y || 0) * 0.3;
            }
        });
    </script>
</body>
</html>
