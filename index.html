<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Для Сони</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header-text {
            position: fixed;
            top: 40px;
            text-align: center;
            width: 100%;
            z-index: 5;
        }

        .header-text h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .header-text p {
            font-style: italic;
            color: #ffb6c1;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .main-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart {
            background-color: #d63384;
            height: 130px;
            width: 130px;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px #ff3399;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart:before, .heart:after {
            background-color: #d63384;
            border-radius: 50%;
            content: "";
            height: 130px;
            width: 130px;
            position: absolute;
        }

        .heart:before { top: -65px; left: 0; }
        .heart:after { left: 65px; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.08); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        .btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.8rem;
            z-index: 10;
            transition: 0.3s;
        }

        /* Точные позиции как на видео */
        .btn-1 { top: -30px; right: -20px; } 
        .btn-2 { top: 40px; left: -60px; }   
        .btn-3 { bottom: 40px; right: -60px; } 
        .btn-4 { bottom: -40px; left: 20px; }  

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #111;
            border: 2px solid #d63384;
            padding: 25px;
            border-radius: 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.4);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-title {
            color: #ffb6c1;
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }

        .modal-text {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #d63384;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>ДЛЯ СОНИ</h1>
        <p>Благодарен Богу за тебя</p>
    </div>

    <div class="main-container">
        <div class="heart"></div>
        <button class="btn btn-1" onclick="openModal('❤️ Главное', 'Соня, ты мой самый дорогой человек. Каждая секунда с тобой — это счастье!')">❤️ Главное</button>
        <button class="btn btn-2" onclick="openModal('☁️ Тот дождь', 'Тот день, когда мы попали под ливень... Помнишь? Я тогда понял, что готов гулять с тобой вечно.')">☁️ Тот дождь</button>
        <button class="btn btn-3" onclick="openModal('🤝 Первая встреча', 'Я помню твою улыбку в тот самый первый раз. Моё сердце тогда пропустило удар.')">🤝 Первая встреча</button>
        <button class="btn btn-4" onclick="openModal('🌊 Наше море', 'Мечтаю снова сидеть с тобой на берегу и смотреть на закат.')">🌊 Наше море</button>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span id="modalTitle" class="modal-title"></span>
            <p id="modalText" class="modal-text"></p>
            <button class="close-btn" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        function openModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('myModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }
        window.onclick = function(event) {
            if (event.target == document.getElementById('myModal')) closeModal();
        }
    </script>
</body>
</html>
