<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Сони</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header-text {
            position: fixed;
            top: 50px;
            text-align: center;
            width: 100%;
            z-index: 5;
        }

        .header-text h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .header-text p {
            font-style: italic;
            color: #ffb6c1;
            margin-top: 5px;
        }

        .main-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart {
            background-color: #d63384;
            height: 140px;
            width: 140px;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px #ff3399;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart:before, .heart:after {
            background-color: #d63384;
            border-radius: 50%;
            content: "";
            height: 140px;
            width: 140px;
            position: absolute;
        }

        .heart:before { top: -70px; left: 0; }
        .heart:after { left: 70px; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.08); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        .btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            z-index: 10;
            transition: 0.3s;
        }

        /* Позиции как в твоем видео */
        .btn-1 { top: -40px; right: -30px; } /* Главное */
        .btn-2 { top: 30px; left: -60px; }   /* Тот дождь */
        .btn-3 { bottom: 30px; right: -70px; } /* Первая встреча */
        .btn-4 { bottom: -50px; left: 20px; }  /* Наше море */

        /* Стили для всплывающего окна (модалки) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 2px solid #d63384;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.5);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            color: #ffb6c1;
            font-size: 1.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .modal-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>ДЛЯ СОНИ</h1>
        <p>Благодарен Богу за тебя</p>
    </div>

    <div class="main-container">
        <div class="heart"></div>
        
        <button class="btn btn-1" onclick="openModal('❤️ Главное', 'Соня, люблю тебя! ✨ Ты — лучшее, что со мной случилось. Этот код, эти слова — всё для тебя. Ты моя бесконечность!')">❤️ Главное</button>
        <button class="btn btn-2" onclick="openModal('☁️ Тот самый ливень', 'Помнишь, как мы промокли до ниточки? Мы бежали, смеялись, и это был самый счастливый дождь в моей жизни.')">☁️ Тот дождь</button>
        <button class="btn btn-3" onclick="openModal('🤝 Первая встреча', 'Мы так стеснялись друг друга... Я боялся сказать лишнее слово, а ты постоянно поправляла волосы. Но я уже тогда понял, что ты особенная.')">🤝 Первая встреча</button>
        <button class="btn btn-4" onclick="openModal('🌊 Наше море', 'Первый раз вместе у воды. Тёплый ветер, шум волн и это невероятное чувство спокойствия, потому что ты была рядом.')">🌊 Наше море</button>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span id="modalTitle" class="modal-title"></span>
            <p id="modalText" class="modal-text"></p>
            <button class="close-btn" onclick="closeModal()">Нажми, чтобы закрыть</button>
        </div>
    </div>

    <script>
        function openModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('myModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }

        // Закрытие при клике вне окна
        window.onclick = function(event) {
            if (event.target == document.getElementById('myModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
