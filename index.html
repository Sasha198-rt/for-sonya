<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Сони</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header-text {
            text-align: center;
            margin-top: 40px; /* Отступ от самого верха экрана */
            margin-bottom: 30px; /* Отступ до кнопок */
            padding: 0 10px;
        }

        .header-text h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        .header-text p {
            font-style: italic;
            color: #ffb6c1;
            margin-top: 5px;
            font-size: 1rem;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 0 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 182, 193, 0.4);
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 182, 193, 0.4);
        }

        .heart-container {
            flex-grow: 1; /* Занимает всё свободное место, толкая сердце вниз */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .heart {
            background-color: #d63384;
            height: 120px;
            width: 120px;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px #ff3399;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart:before, .heart:after {
            background-color: #d63384;
            border-radius: 50%;
            content: "";
            height: 120px;
            width: 120px;
            position: absolute;
        }

        .heart:before { top: -60px; left: 0; }
        .heart:after { left: 60px; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        #message-display {
            text-align: center;
            padding: 15px;
            margin-bottom: 40px;
            width: 85%;
            font-size: 1.1rem;
            color: #ffb6c1;
            min-height: 60px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>ДЛЯ СОНИ</h1>
        <p>Благодарен Богу за тебя</p>
    </div>

    <div class="buttons-container">
        <button class="btn" onclick="showMessage('❤️ Главное', 'Ты самое дорогое, что у меня есть.')">❤️ Главное</button>
        <button class="btn" onclick="showMessage('☁️ Тот дождь', 'Помнишь, как мы гуляли под дождем? Это было волшебно.')">☁️ Тот дождь</button>
        <button class="btn" onclick="showMessage('🤝 Первая встреча', 'Тот день изменил мою жизнь навсегда.')">🤝 Первая встреча</button>
        <button class="btn" onclick="showMessage('🌊 Наше море', 'Мечтаю снова оказаться там вместе с тобой.')">🌊 Наше море</button>
    </div>

    <div class="heart-container">
        <div class="heart"></div>
    </div>

    <div id="message-display">Нажми на любую кнопку...</div>

    <script>
        function showMessage(title, text) {
            const display = document.getElementById('message-display');
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerHTML = `<strong>${title}</strong><br>${text}`;
                display.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
