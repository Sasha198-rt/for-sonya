<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Для Сони</title>
    <style>
        body {
            margin: 0;
            background: #050005;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        /* Холст для звезд */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .main-heart {
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: #ff1493;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px #ff1493, 0 0 100px #ff1493;
            animation: beat 1.2s infinite;
            z-index: 2;
            transition: transform 0.1s ease-out; /* Для наклона */
        }

        .main-heart::before, .main-heart::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: #ff1493;
            border-radius: 50%;
        }

        .main-heart::before { top: -70px; left: 0; }
        .main-heart::after { left: 70px; top: 0; }

        @keyframes beat {
            0% { transform: rotate(-45deg) scale(1); }
            15% { transform: rotate(-45deg) scale(1.15); }
            30% { transform: rotate(-45deg) scale(1); }
            45% { transform: rotate(-45deg) scale(1.08); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        .memory-btn {
            position: absolute;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 13px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
            transition: transform 0.2s;
        }

        #story-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            background: rgba(10, 0, 5, 0.98);
            padding: 25px;
            border-radius: 25px;
            border: 2px solid #ff1493;
            text-align: center;
            z-index: 100;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.4);
        }

        #story-box.active { transform: translate(-50%, -50%) scale(1); }

        .close-btn {
            margin-top: 20px;
            background: #ff1493;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
            font-size: 14px;
        }

        .name-label {
            position: absolute;
            top: 10%;
            font-size: 24px;
            letter-spacing: 6px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            z-index: 5;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>
    <div class="name-label">ДЛЯ СОНИ</div>
    <div class="main-heart" id="heart"></div>

    <div class="memory-btn" style="top: 25%; left: 10%;" onclick="showStory(0)">🌧️ Тот дождь</div>
    <div class="memory-btn" style="top: 70%; right: 10%;" onclick="showStory(1)">🤝 Первая встреча</div>
    <div class="memory-btn" style="top: 80%; left: 15%;" onclick="showStory(2)">🌊 Наше море</div>
    <div class="memory-btn" style="top: 20%; right: 15%;" onclick="showStory(3)">❤️ Главное</div>

    <div id="story-box">
        <h2 id="title" style="color: #ff69b4;"></h2>
        <p id="text" style="font-size: 16px; line-height: 1.5;"></p>
        <div class="close-btn" onclick="closeStory()">Понятно ❤️</div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const heart = document.getElementById('heart');
        let stars = [];
        let mouse = { x: -100, y: -100 };
        let tilt = { x: 0, y: 0 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    baseX: 0, baseY: 0,
                    speed: 0.5 + Math.random() * 1
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            
            stars.forEach(s => {
                // Взаимодействие с пальцем
                let dx = mouse.x - s.x;
                let dy = mouse.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 80) {
                    s.x -= dx / 10;
                    s.y -= dy / 10;
                }

                // Движение звезд вниз
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;

                // Эффект наклона телефона
                let finalX = s.x + (tilt.x * 20);
                let finalY = s.y + (tilt.y * 20);

                ctx.beginPath();
                ctx.arc(finalX, finalY, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Наклон сердца
            heart.style.transform = `rotate(-45deg) translate(${tilt.x * 30}px, ${tilt.y * 30}px)`;
            
            requestAnimationFrame(drawStars);
        }

        // Слушатель касаний
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            mouse.x = e.touches[0].clientX; 
            mouse.y = e.touches[0].clientY; 
        });

        // Слушатель наклона (акселерометр)
        window.addEventListener('deviceorientation', e => {
            tilt.x = e.gamma / 30; // Наклон влево-вправо
            tilt.y = e.beta / 30;  // Наклон вперед-назад
        });

        const stories = [
            { t: "Тот самый ливень 🌧️", txt: "Помнишь, как мы промокли до ниточки? Мы бежали, смеялись, и это был самый счастливый дождь в моей жизни. Я тогда понял, что мне с тобой ничего не страшно." },
            { t: "Первая встреча ❤️", txt: "Мы так стеснялись друг друга... Я боялся сказать лишнее слово, а ты постоянно поправляла волосы. Но я уже тогда почувствовал, что ты особенная." },
            { t: "Наше море 🌊", txt: "Первый раз вместе у воды. Тёплый ветер, шум волн и это невероятное чувство спокойствия, потому что ты была рядом. Хочу повторить это еще тысячу раз." },
            { t: "Соня, люблю тебя! ✨", txt: "Ты — лучшее, что со мной случилось. Этот код, эти слова — всё для тебя. Ты моя бесконечность!" }
        ];

        function showStory(id) {
            document.getElementById('title').innerText = stories[id].t;
            document.getElementById('text').innerText = stories[id].txt;
            document.getElementById('story-box').classList.add('active');
        }

        function closeStory() {
            document.getElementById('story-box').classList.remove('active');
        }

        window.addEventListener('resize', init);
        init();
        drawStars();
    </script>
</body>
</html>
